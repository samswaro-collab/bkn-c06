<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAKON</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060f1e;display:flex;align-items:center;justify-content:center;
     min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;}
#al{text-align:center;color:#fff;}
.sp{width:40px;height:40px;border:3px solid rgba(0,212,200,0.2);
    border-top-color:#00d4c8;border-radius:50%;
    animation:sp .8s linear infinite;margin:0 auto 16px;}
@keyframes sp{to{transform:rotate(360deg)}}
.lt{font-size:11px;color:#00a6a0;letter-spacing:1.5px;text-transform:uppercase;}
#ul{display:none;flex-direction:column;align-items:center;gap:14px;
    max-width:340px;width:100%;padding:0 24px;}
.bn{font-size:22px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:4px;}
.bt{font-size:9px;color:#f59e0b;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.ui{width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,212,200,0.3);border-radius:8px;color:#fff;
    font-size:13px;font-family:inherit;}
.ui:focus{outline:none;border-color:#00d4c8;}
.ub{width:100%;padding:12px;background:linear-gradient(135deg,#00d4c8,#007a75);
    border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;
    cursor:pointer;letter-spacing:.5px;}
.ub:hover{opacity:.9;}
.ue{font-size:11px;color:#f87171;display:none;text-align:center;}
</style>
</head>
<body>
<div id="al"><div class="sp"></div><div class="lt">Loading Intelligence...</div></div>
<div id="ul">
  <div>
    <div class="bn">BEAKON</div>
    <div class="bt">Signal to Signed</div>
  </div>
  <div class="lt" style="margin-bottom:4px;">Enter your access key to continue</div>
  <input id="ki" class="ui" type="password" placeholder="Access key" autofocus
         onkeydown="if(event.key==='Enter')go()">
  <button class="ub" onclick="go()">UNLOCK &rarr;</button>
  <div id="ue" class="ue">Invalid key &mdash; please check and try again.</div>
</div>

  return new TextDecoder().decode(d);
}
async function render(p){const h=await dec(p);document.open();document.write(h);document.close();}
async function init(){
  const p=new URLSearchParams(location.search).get('t');
  if(p){try{await render(p);return;}catch(e){}}
  document.getElementById('al').style.display='none';
  document.getElementById('ul').style.display='flex';
}
async function go(){
  const p=document.getElementById('ki').value.trim();
  if(!p)return;
  document.getElementById('ue').style.display='none';
  try{await render(p);}
  catch(e){document.getElementById('ue').style.display='block';}
}
init();
</script>
